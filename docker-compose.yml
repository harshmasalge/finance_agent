services:
  db:
    image: timescale/timescaledb-ha:pg15
    container_name: finsight_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: finsight
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: finsight_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:latest
    container_name: finsight_chroma
    environment:
      - IS_PERSISTENT=TRUE
    ports:
      - "8000:8000"
    volumes:
      - chromadata:/chroma/chroma
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: finsight_backend
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8001 --reload
    env_file: .env
    volumes:
      - .:/app
    ports:
      - "8001:8001"
    depends_on:
      - db
      - redis
      - chromadb

  celery_worker:
    build: ./backend
    container_name: finsight_worker
    command: celery -A backend.celery_app worker --loglevel=info --concurrency=4
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      - db
      - redis

  celery_beat:
    build: ./backend
    container_name: finsight_beat
    command: celery -A backend.celery_app beat --loglevel=info
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      - db
      - redis

  frontend:
    build: ./frontend
    container_name: finsight_frontend
    command: npm run dev -- --host
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    depends_on:
      - backend

volumes:
  pgdata:
  redisdata:
  chromadata:
